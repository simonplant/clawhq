id: sterling-gen4
name: Sterling Gen-4
description: "Multi-agent ClawHQ deployment — life-ops + markets + vision under one engine, with per-agent model routing (local hot path + OpenRouter for heavy reasoning)"
replaces: "single-agent ClawHQ instances when one workspace needs multiple specialised personas"

operating_mandate: >
  Sterling is a multi-agent host. Each agent owns a role and a workspace;
  the engine routes channel traffic to the right one via `agents.bindings`
  in openclaw.json. Personality is shared (one canonical voice); behaviour
  varies per agent through workspace IDENTITY.md / TOOLS.md / cron — never
  through a per-agent personality vector.

  M2 scope: one agent (`life-ops`). M3 partitions workspaces. M4 adds
  `markets` and `vision`. The profile schema supports the full lineup
  today; the YAML below ships only what's been validated end-to-end.

# Profile-level tools/skills/cron are the SHARED defaults every agent
# inherits unless its per-agent block overrides them. Keep this minimal
# during M2 — the single agent below mirrors the life-ops surface.
tools:
  - name: backlog
    category: core
    description: "Local work queue for autonomous task execution"
    required: true

skills: []

integrations:
  required: [messaging]
  recommended: []
  optional: []

cron_defaults:
  heartbeat:
    expr: "*/15 * * * *"
    announce: false

cron_prompts:
  heartbeat: >
    Run heartbeat: check the agent's workspace for any deferred work or
    alerts. If nothing actionable, respond HEARTBEAT_OK.

delegation:
  - action: respond_to_message
    tier: execute
    example: "Reply to direct messages in the routed channel — no escalation"
  - action: send_message
    tier: approve
    example: "Send anything not in response to a user prompt — explicit approval required"

egress_domains: []

security_posture: hardened
autonomy_default: medium

memory_policy:
  hot_max: "50KB"
  hot_retention: "7d"
  warm_retention: "90d"
  cold_retention: "365d"
  summarization: balanced

monitoring:
  heartbeat_frequency: "15min"
  checks: []
  quiet_hours: "22:00-06:00"
  alert_on: [credential_expiry, cron_failure]

day_in_the_life: >
  Sterling boots one OpenClaw engine that hosts every agent in its
  agents.list[]. The default agent (life-ops) handles general traffic;
  future siblings (markets, vision) own specialised routes. Each agent
  reads its own workspace — distinct IDENTITY.md, distinct memory,
  distinct cron jobs — but all share the canonical Sterling voice and
  the single set of provider connections.

# ── Multi-agent declaration ────────────────────────────────────────────
# M4 ships three agents — life-ops (default, local hot path), markets
# (heavy reasoning on OpenRouter), vision (multimodal, fully local).
# Per-agent fallback chains are honored by upstream OpenClaw
# (https://docs.openclaw.ai/concepts/model-failover).
#
# Operational requirements before `clawhq apply` will succeed:
#   - ollama pull gpt-oss:20b         (~12 GB on disk)
#   - ollama pull qwen2.5vl:32b-q4_K_M (~20 GB on disk)
#   - clawhq creds set OPENROUTER_API_KEY <key>
agents:
  # ── life-ops — local hot path, OpenRouter on failure ─────────────────
  - id: life-ops
    default: true
    # workspace defaults to the agent id (life-ops/) when omitted.
    name: Life-ops
    description: >
      Default agent. Handles general life-ops traffic — email triage,
      calendar conflicts, task tracking, ambient messages, household
      coordination. Local primary keeps the hot loop fast; falls back
      to OpenRouter for any heavy reasoning the 20B can't carry. You
      are the everyday agent — keep responses concise, action-biased,
      and grounded in the user's calendar/email/task state.
    model:
      primary: ollama/gpt-oss:20b
      fallbacks:
        - openrouter/nvidia/nemotron-3-super-120b-a12b:free
        - openrouter/anthropic/claude-sonnet-4.6

  # ── markets — heavy reasoning, remote primary ────────────────────────
  - id: markets
    name: Markets
    description: >
      Trading research and pre-market briefing specialist. Synthesises
      Mancini, Focus 25, DP signals into ranked order-ready ideas.
      Alert-grade only — never submits orders; the user executes
      manually. Operates in the heavy-reasoning slot: primary is
      Nemotron Super 120B on OpenRouter, with paid Nemotron and Opus
      4.7 as escalation. Position and account context flows to the
      remote provider on every turn — explicitly authorised for this
      agent.
    model:
      # Free tier first (262K ctx); paid Nemotron Super on rate-limit;
      # Opus 4.7 as the genuine frontier escape hatch for the hardest
      # multi-step trading reasoning. Position data leaves the machine
      # on every turn — explicitly authorised for this agent only.
      primary: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      fallbacks:
        - openrouter/nvidia/nemotron-3-super-120b-a12b
        - openrouter/anthropic/claude-opus-4.7

  # ── vision — multimodal, fully local, no remote fallback ─────────────
  - id: vision
    name: Vision
    description: >
      Multimodal agent for screenshots, charts, OCR, and image
      interpretation. Stays fully on-machine — image content never
      leaves the device, even on local outage (model.fallbacks empty).
      Invoked on demand by other agents or the user; no heartbeat
      cron. Sandbox=all,scope=agent provides workspace isolation from
      the other agents.
    # No fallbacks: vision content (images, OCR) stays on the machine.
    # On local outage the agent fails loud rather than escaping to
    # OpenRouter. qwen2.5vl 32B Q4 fits the 5090 alongside one other
    # loaded model.
    model: ollama/qwen2.5vl:32b-q4_K_M
    sandbox:
      mode: all
      scope: agent
