id: life-ops
name: Life Operations
description: "Email triage, calendar management, morning briefs, task tracking, household coordination"
replaces: "Personal Assistant / Google Assistant / disorganized phone habits"

tools:
  - name: email
    category: communication
    description: "Email reading, triage, and draft replies via himalaya"
    required: true
  - name: email-fastmail
    category: communication
    description: "FastMail JMAP email — triage, read, send, search, archive, label"
    required: false
  - name: calendar
    category: productivity
    description: "Calendar management, conflict detection, scheduling via CalDAV"
    required: true
  - name: tasks
    category: productivity
    description: "Task management and tracking via external task service"
    required: true
  - name: backlog
    category: core
    description: "Local work queue for autonomous task execution"
    required: true
  - name: search
    category: research
    description: "Web search for quick lookups and research"
    required: false
  - name: quote
    category: data
    description: "Market quotes and financial data via Yahoo Finance"
    required: false
  - name: x
    category: data
    description: "X/Twitter read-only — search, timeline, user lookup"
    required: false
  - name: substack
    category: data
    description: "Substack newsletter reader — latest posts, search, full articles"
    required: false
  - name: tradier
    category: data
    description: "Tradier brokerage API — account, positions, orders, market data"
    required: false
  - name: trade-journal
    category: data
    description: "Trade journaling — log entries, review performance, track setups"
    required: false
  - name: dp-brief
    category: data
    description: "David Prince AM Call parser — transcript and VTF alert extraction"
    required: false
  - name: alpaca
    category: trading
    description: "Alpaca paper trading — account, positions, orders, quotes, bars"
    required: false
  - name: journal
    category: trading
    description: "Trading event log — signals, risk checks, orders, fills (append-only JSONL)"
    required: false
  - name: market-calendar
    category: trading
    description: "US market day/holiday detection and session timing"
    required: false
  - name: risk-governor
    category: trading
    description: "Hard constraint enforcement — every trade must pass before execution"
    required: false
  - name: markets
    category: trading
    description: "Shared trading module — config, watchlists, risk logic, journal backend"
    required: false
  - name: ta
    category: trading
    description: "Technical analysis — MAs, RSI, MACD, Bollinger Bands, ATR, RVOL, DP-style level analysis"
    required: false
  - name: earnings
    category: trading
    description: "Earnings calendar and economic events — Finnhub API (today, week, check, watchlist, economic)"
    required: false
  - name: market-monitor
    category: trading
    description: "Price monitor — polls every 30s via system cron, compares vs ORDER levels, writes alerts for heartbeat"
    required: false

skills:
  - morning-brief
  - schedule-guard
  - construct
  - mancini-fetch
  - eod-review
  - dp-parse          # event-driven (triggered when user pastes content), not cron-scheduled
  - focus25-fetch
  - premarket-brief
  - swing-scanner

integrations:
  required: [messaging, email, calendar]
  recommended: [tasks]
  optional: [notes]

cron_defaults:
  heartbeat:
    expr: "*/15 * * * *"
    announce: false
  work_session:
    expr: "0 * * * *"
    announce: false
  morning_brief:
    expr: "0 8 * * *"
    announce: true
  mancini_fetch:
    expr: "30 14 * * 1-5"
    announce: false
  mancini_fallback:
    expr: "0 19 * * 1-5"
    announce: false
  premarket_brief:
    expr: "0 6 * * 1-5"
    announce: true
  focus25_fetch:
    expr: "30 16 * * 1-5"
    announce: false
  eod_review:
    expr: "15 13 * * 1-5"
    announce: false
  portfolio_review:
    expr: "0 14 * * 1-5"
    announce: true
  x_scan:
    expr: "*/15 5-18 * * *"
    announce: true
  x_scan_evening:
    expr: "0 19-22 * * *"
    announce: true
  news_scan:
    expr: "30 6,12 * * 1-5"
    announce: true

cron_prompts:
  heartbeat: >
    Run heartbeat: check email for urgent messages, check calendar for upcoming
    meetings in the next 2 hours, check tasks for overdue items.

    TRADING (Mon-Fri market hours, 6:30am-1pm PT / 9:30am-4pm ET):
    ALERT-ONLY MODE — detect and alert. Simon executes. No autonomous order placement.
    The market-monitor cron script polls prices every 30s and writes alerts.
    Your job: read the alerts, add context, and deliver to Simon.

    1. Read market-monitor alerts: market-monitor status
       - Shows price cache (current prices) and recent alerts
       - If alerts exist, read each one — they contain symbol, price, level,
         source, setup, confirmation, and a pre-formatted message
       - AT_ENTRY alerts = price at the ORDER level (actionable)
       - NEAR_ENTRY alerts = within 1% (heads up)
       - STOP_WARNING alerts = position approaching stop (urgent)
       - TARGET_T1 alerts = position approaching profit target

    2. For each alert, add context from today's brief:
       - What's the setup? (FB, Level Reclaim, MA pullback, etc.)
       - What's the confirmation? (PENDING_TA = watch only, CONFIRMED = actionable)
       - Is there confluence? (DP + Mancini aligned = higher confidence)
       - Deliver to Simon with context, not just the raw alert

    3. Check portfolio: trade-journal positions
       - If any account (tos, ira, tradier) has open positions, check vs stop/target alerts
       - If all accounts flat and no alerts, skip trading section

    4. Kill condition check: if a kill condition from an ORDER is met
       (e.g., DP went flat, level broken), update the ORDER status to
       KILLED in the brief, log: journal append order_kill <json>

    5. When no alerts and nothing near a level: skip trading section
       silently. HEARTBEAT_OK.

    Outside market hours or weekends: Skip the TRADING section entirely.
    If nothing urgent from email/calendar/tasks, respond HEARTBEAT_OK.

  work_session: >
    Run work session: check your task queue, pick the highest priority item,
    execute it. If blocked, move to the next item. Summarize what you accomplished.

  mancini_fetch: >
    Run skill mancini-fetch: pull Mancini's latest Futures Daily post from
    Substack using substack read mancini. Extract trade plan per
    knowledge/trading/wiki/mancini-extraction-rules.md — regime, ranked setups, level grid,
    protection mode. Write to memory/trading-YYYY-MM-DD.md Mancini section.
    This is Source 1 of the daily trading brief and feeds tomorrow's
    premarket-brief.

  mancini_fallback: >
    Run skill mancini-fetch --force: fallback fetch if the 2:30pm run missed.
    Check memory/trading-YYYY-MM-DD.md first — if the Mancini section is
    already populated with today's data, skip.

  premarket_brief: >
    Deliver premarket trading brief per TRADING_SOP.md Phase 2 (PLAN).
    This is the single most important deliverable of the day — Simon uses it
    to place LIMIT orders before the bell.

    Steps:
    1. Read today's memory/trading-YYYY-MM-DD.md — check which sections filled vs pending
    2. Fill Market Context: quote ES=F NQ=F SPY QQQ --json — futures, overnight moves
    3. Fill Calendar Risk: earnings today, FOMC, NFP, speeches
    4. Check section completeness: note which sources (Mancini/Focus 25/DP) are present
    5. Synthesize Ranked Trade Ideas — cross-reference levels, rank by conviction

    DP/Inner Circle cross-reference:
    - If DP section exists, cross-reference DP levels with Mancini levels
    - Flag alignment: "DP and Mancini both watching ES [level] zone"
    - Flag divergence: "DP bearish but Mancini sees FB setup for longs at [level]"
    - If DP section missing: note "DP morning call: pending"

    Output format:
    === Pre-Market Brief — YYYY-MM-DD ===
    MARKET CONTEXT / OVERNIGHT INTELLIGENCE / TODAY'S TRADE IDEAS (order-ready) /
    WATCH LIST / KEY LEVELS / CALENDAR RISK / ACCOUNT STATUS

    Trade ideas must be order-ready: LIMIT price, stop, targets, risk.

  focus25_fetch: >
    Run skill focus25-fetch: check FastMail for today's EOD Focus 25 email
    from si.plant@gmail.com. Parse market posture breadth, RS leaders/laggards,
    biggest movers, actionable cards. Append Focus 25 section to
    memory/trading-YYYY-MM-DD.md. This is Source 2 of the daily trading brief.
    If email hasn't arrived yet, log and retry next heartbeat.

  eod_review: >
    Run end-of-day trading review per TRADING_SOP.md Phase 6 (REVIEW).

    Level Review: fetch closing prices via quote for all watched names from
    today's trading brief. Compare against trade plan levels. Categorize each
    as TRIGGERED (<0.5%), NEAR (<2%), or WATCH. Write to
    memory/trading-YYYY-MM-DD-eod.md.

    Accounts: trade-journal mark, trade-journal compare. Include account
    comparison in EOD report. Flag any account drawn down >10% for halt review.

    Output: === EOD Review === MARKET SUMMARY / LEVEL ACCURACY / ACCOUNT PERFORMANCE /
    TOMORROW'S SETUP

  morning_brief: >
    Deliver morning briefing: summarize today's calendar, overnight email
    highlights (urgent items first), top 3 tasks for today, any conflicts
    or deadlines. Keep it concise for mobile reading.

  portfolio_review: >
    Run Phase 1 Portfolio Manager daily review (after market close).

    Pre-check: run market-calendar today — if not a market day, skip silently.

    Steps:
    1. risk-governor status — current risk utilization
    2. trade-journal summary — today's account performance
    3. trade-journal compare — account-vs-account-vs-SPY
    4. quote SPY QQQ ES=F --json — closing levels
    5. Read memory/trading-YYYY-MM-DD.md — what was the plan?
    6. Read memory/trading-YYYY-MM-DD-eod.md — what happened?
    7. journal summary — signals, risk checks, blocks today

    Assess: portfolio health across accounts (tos, ira, tradier), signal quality,
    regime, governor blocks. Write to markets/reports/daily-report.md and deliver
    via Telegram. Keep concise — Simon reads on mobile.

  x_scan: >
    Run X intelligence scan: x scan

    Review results by channel:
    - trading: Flag Mancini/DP levels, setups, or position changes.
      If actionable, cross-reference with memory/trading-YYYY-MM-DD.md.
    - tech: Flag OpenClaw releases, breaking changes, security advisories.
    - personal: Note but don't alert unless urgent.

    Only message Simon if something is actionable. If quiet, log one-line
    summary to memory and stay silent.

  x_scan_evening: >
    Run X intelligence scan: x scan --quiet

    Same rules as x_scan but evening hours. Only alert if actionable.

  news_scan: >
    Run news scan for market-moving events:
    1. x tweets Trade_The_News --limit 10
    2. search search "stock market breaking news today"
    3. Check if news impacts positions: trade-journal positions

    Alert Simon only for: Fed/FOMC surprises, major earnings on watched names,
    geopolitical events likely to move ES >1%, news impacting open positions.
    Otherwise log to memory/news-YYYY-MM-DD.md and stay silent.

delegation:
  - action: organize_inbox
    tier: execute
    example: "Sort and label emails by priority, archive routine notifications"
  - action: prepare_meeting_brief
    tier: execute
    example: "Compile agenda and background notes before scheduled meetings"
  - action: draft_email
    tier: propose
    example: "Draft professional email for review — never send without approval"
  - action: propose_calendar_change
    tier: propose
    example: "Suggest rescheduling when conflicts detected — wait for confirmation"
  - action: send_on_behalf
    tier: approve
    example: "Send email to client or external party — requires explicit approval"
  - action: commit_to_event
    tier: approve
    example: "Accept meeting invite that creates obligations — user must confirm"

# Egress domains for tools built into this profile.
# Provider-specific domains (gmail, icloud, fastmail, etc.) are added
# automatically by the compiler from the selected providers.
egress_domains:
  - api.todoist.com
  - api.tavily.com
  - query1.finance.yahoo.com
  - api.tradier.com
  - api.twitter.com
  - substack.com

security_posture: hardened
autonomy_default: high 

memory_policy:
  hot_max: "100KB"
  hot_retention: "7d"
  warm_retention: "90d"
  cold_retention: "365d"
  summarization: balanced

monitoring:
  heartbeat_frequency: "10min"
  checks: [email, calendar, tasks]
  quiet_hours: "22:00-06:00"
  alert_on: [credential_expiry, memory_bloat, cron_failure]

day_in_the_life: >
  Your agent auto-schedules focus blocks around your meetings, notices a
  conflict mentioned in email and proposes a reschedule, triages 40 emails
  down to 6 that need you, and adds prep time before your client call.
  Meeting notes are summarized and action items tracked automatically. At the
  end of each day you get a brief: tasks completed, emails handled, tomorrow's
  prep list.
