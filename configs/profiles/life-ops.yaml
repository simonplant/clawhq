id: life-ops
name: Life Operations
description: "Email triage, calendar management, morning briefs, task tracking, household coordination"
replaces: "Personal Assistant / Google Assistant / disorganized phone habits"

tools:
  - name: email
    category: communication
    description: "Email reading, triage, and draft replies via himalaya"
    required: true
  - name: email-fastmail
    category: communication
    description: "FastMail JMAP email — triage, read, send, search, archive, label"
    required: false
  - name: ical
    category: productivity
    description: "Calendar management, conflict detection, scheduling via CalDAV"
    required: true
  - name: todoist
    category: productivity
    description: "Task management and tracking via Todoist API"
    required: true
  - name: tasks
    category: core
    description: "Local work queue for autonomous task execution"
    required: true
  - name: tavily
    category: research
    description: "Web search for quick lookups and research"
    required: false
  - name: quote
    category: data
    description: "Market quotes and financial data via Yahoo Finance"
    required: false
  - name: x
    category: data
    description: "X/Twitter read-only — search, timeline, user lookup"
    required: false
  - name: substack
    category: data
    description: "Substack newsletter reader — latest posts, search, full articles"
    required: false
  - name: tradier
    category: data
    description: "Tradier brokerage API — account, positions, orders, market data"
    required: false
  - name: trade-journal
    category: data
    description: "Trade journaling — log entries, review performance, track setups"
    required: false
  - name: dp-brief
    category: data
    description: "David Prince AM Call parser — transcript and VTF alert extraction"
    required: false

skills:
  - morning-brief
  - schedule-guard
  - construct
  - mancini-fetch
  - eod-review
  # dp-parse is event-driven (triggered when user pastes content), not cron-scheduled

integrations:
  required: [messaging, email, calendar]
  recommended: [tasks]
  optional: [notes]

cron_defaults:
  heartbeat: "*/10 * * * *"
  work_session: "*/15 * * * *"
  morning_brief: "30 7 * * *"
  mancini_fetch: "30 14 * * 1-5"
  mancini_fallback: "0 19 * * 1-5"
  premarket_brief: "0 6 * * 1-5"
  eod_review: "15 13 * * 1-5"

cron_prompts:
  heartbeat: "Run heartbeat: check email for urgent messages, check calendar for upcoming meetings in the next 2 hours, check tasks for overdue items. If nothing urgent, respond HEARTBEAT_OK."
  work_session: "Run work session: check your task queue, pick the highest priority item, execute it. If blocked, move to the next item. Summarize what you accomplished."
  mancini_fetch: "Run skill mancini-fetch: pull Mancini's latest Futures Daily post from Substack, extract trade plan per EXTRACT_MANCINI.md, write to memory/trading-YYYY-MM-DD.md."
  mancini_fallback: "Run skill mancini-fetch --force: fallback fetch if the 2:30pm run missed. Check memory/trading-YYYY-MM-DD.md first — skip if already populated."
  premarket_brief: "Deliver premarket brief: read today's trading-YYYY-MM-DD.md, summarize key levels, upcoming catalysts, and overnight moves. Format for quick mobile read."
  eod_review: "Run skill eod-review: fetch closing prices via quote for all watched names, compare against today's trade plan levels, categorize as TRIGGERED/NEAR/WATCH. Write to memory/trading-YYYY-MM-DD-eod.md."
  morning_brief: "Deliver morning briefing: summarize today's calendar, overnight email highlights (urgent items first), top 3 tasks for today, any conflicts or deadlines."

delegation:
  - action: organize_inbox
    tier: execute
    example: "Sort and label emails by priority, archive routine notifications"
  - action: prepare_meeting_brief
    tier: execute
    example: "Compile agenda and background notes before scheduled meetings"
  - action: draft_email
    tier: propose
    example: "Draft professional email for review — never send without approval"
  - action: propose_calendar_change
    tier: propose
    example: "Suggest rescheduling when conflicts detected — wait for confirmation"
  - action: send_on_behalf
    tier: approve
    example: "Send email to client or external party — requires explicit approval"
  - action: commit_to_event
    tier: approve
    example: "Accept meeting invite that creates obligations — user must confirm"

# Egress domains for tools built into this profile.
# Provider-specific domains (gmail, icloud, fastmail, etc.) are added
# automatically by the compiler from the selected providers.
egress_domains:
  - api.todoist.com
  - api.tavily.com
  - query1.finance.yahoo.com
  - api.tradier.com
  - api.twitter.com
  - substack.com

security_posture: hardened
autonomy_default: high 

memory_policy:
  hot_max: "100KB"
  hot_retention: "7d"
  warm_retention: "90d"
  cold_retention: "365d"
  summarization: balanced

monitoring:
  heartbeat_frequency: "10min"
  checks: [email, calendar, tasks]
  quiet_hours: "22:00-06:00"
  alert_on: [credential_expiry, memory_bloat, cron_failure]

day_in_the_life: >
  Your agent auto-schedules focus blocks around your meetings, notices a
  conflict mentioned in email and proposes a reschedule, triages 40 emails
  down to 6 that need you, and adds prep time before your client call.
  Meeting notes are summarized and action items tracked automatically. At the
  end of each day you get a brief: tasks completed, emails handled, tomorrow's
  prep list.
