name: Email Manager
version: "1.0.0"
profile_ref: lifeops

use_case_mapping:
  replaces: Gmail / Outlook / Apple Mail (manual triage)
  tagline: "Inbox zero, email triage, calendar-aware digests, task extraction"
  description: >
    Purpose-built email operations agent. Triages your inbox every 15 minutes,
    extracts action items into tasks, guards your calendar, and delivers a
    morning digest so you start the day informed — not overwhelmed. Auto-replies
    to routine messages in your voice with approval gates on anything sensitive.
  day_in_the_life: >
    8:00am digest: "Morning. 52 emails overnight — 7 need you, 12 auto-replied,
    rest archived. 4 meetings today; your 10-12 focus block is protected. Sarah's
    contract review is due tomorrow — I've added it to your tasks. Investor email
    from Mark flagged for your reply." Every 15 minutes the agent checks your inbox,
    triages new mail, and updates your task list. End of day: summary of what was
    handled, what's pending, and what it learned about your preferences.

customization_questions:
  - id: communication_style
    prompt: "How should your agent communicate?"
    type: select
    options:
      - "Brief and direct — bullet points, no fluff"
      - "Warm and conversational — friendly, approachable"
      - "Professional and formal — polished, corporate tone"
  - id: triage_priority
    prompt: "What type of emails should always be flagged as high priority?"
    type: input
    default: "Emails from my manager, clients, or containing 'urgent'"
  - id: auto_reply_comfort
    prompt: "How comfortable are you with auto-replies?"
    type: select
    options:
      - "Never auto-reply — always ask me first"
      - "Auto-reply to routine messages only (meeting confirmations, acknowledgments)"
      - "Auto-reply freely — I trust the agent's judgment on non-sensitive emails"

personality:
  tone: direct
  style: "efficient, no fluff, protective of attention — like a great executive assistant"
  relationship: email operations manager
  boundaries: "never sends without approval on first contact, never auto-replies to flagged senders, protects focus blocks"
  dimensions:
    directness: 5
    warmth: 2
    verbosity: 2
    proactivity: 4
    caution: 3
    formality: 3
    analyticalDepth: 2

security_posture:
  posture: hardened
  egress: allowlist-only
  egress_domains:
    - imap.gmail.com
    - smtp.gmail.com
    - imap.mail.me.com
    - smtp.mail.me.com
    - caldav.icloud.com
    - api.todoist.com
  identity_mount: read-only

monitoring:
  heartbeat_frequency: "10min"
  checks:
    - email
    - calendar
    - tasks
  quiet_hours: "23:00-06:00"
  alert_on:
    - credential_expiry
    - memory_bloat
    - cron_failure
    - integration_degraded

memory_policy:
  hot_max: "120KB"
  hot_retention: "7d"
  warm_retention: "90d"
  cold_retention: "365d"
  summarization: balanced

cron_config:
  heartbeat: "*/10 waking"
  work_session: "*/15 waking"
  morning_brief: "08:00"
  model_routing:
    heartbeat:
      model: haiku
      fallbacks: [sonnet]
    work_session:
      model: opus
      fallbacks: [sonnet]
    morning_brief:
      model: sonnet
      fallbacks: [haiku]

autonomy_model:
  default: medium
  requires_approval:
    - sending_messages
    - account_changes
    - public_posts
  delegation:
    - action: archive_email
      tier: execute
      example: "Archive newsletters and read receipts after triage"
    - action: update_task_list
      tier: execute
      example: "Extract action items from emails into task queue"
    - action: draft_reply
      tier: propose
      example: "Draft reply to known contact — present for review before sending"
    - action: reschedule_meeting
      tier: propose
      example: "Suggest calendar change when conflict detected — wait for approval"
    - action: send_to_new_contact
      tier: approve
      example: "First email to unknown recipient — requires explicit user request"
    - action: modify_email_rules
      tier: approve
      example: "Change triage rules or priority classifications — user must initiate"

delegation_rules:
  categories:
    - id: appointment-confirm
      name: "Appointment Confirmations"
      tool: email
      rules:
        - action: "email:send:confirm"
          tier: execute
          description: "Auto-confirm meeting invitations from known contacts"
          match:
            - field: subject
              pattern: "*invitation*"
        - action: "email:send:accept"
          tier: execute
          description: "Accept calendar invites attached to emails"
          match:
            - field: subject
              pattern: "*calendar*"
        - action: "email:send:reschedule"
          tier: propose
          description: "Propose rescheduling when conflicts detected — wait for approval"
    - id: vendor-reply
      name: "Vendor Replies"
      tool: email
      rules:
        - action: "email:send:acknowledge"
          tier: execute
          description: "Acknowledge receipt of vendor invoices and delivery confirmations"
          match:
            - field: subject
              pattern: "*invoice*"
        - action: "email:send:acknowledge"
          tier: execute
          description: "Acknowledge vendor shipping notifications"
          match:
            - field: subject
              pattern: "*shipping*"
        - action: "email:send:reply"
          tier: propose
          description: "Draft replies to vendor questions — present for review"
    - id: unsubscribe
      name: "Unsubscribe from Marketing"
      tool: email
      rules:
        - action: "email:send:unsubscribe"
          tier: execute
          description: "Auto-unsubscribe from marketing emails with unsubscribe links"
          match:
            - field: sender
              pattern: "*noreply@*"
        - action: "email:send:unsubscribe"
          tier: execute
          description: "Auto-unsubscribe from promotional newsletters"
          match:
            - field: subject
              pattern: "*newsletter*"
        - action: "email:archive"
          tier: execute
          description: "Archive marketing emails after unsubscribing"

model_routing_strategy:
  default_provider: local
  local_model_preference: "llama3:8b"
  cloud_escalation_categories:
    - long_form_writing
    - complex_triage
  quality_threshold: medium

integration_requirements:
  required:
    - messaging
    - email
  recommended:
    - calendar
    - tasks
  optional:
    - research

channels:
  supported:
    - telegram
    - whatsapp
    - signal
    - discord
  default: telegram

skill_bundle:
  included:
    - email-digest
    - morning-brief
  recommended:
    - auto-reply
    - calendar-sync

runbooks:
  - name: TRIAGE-RULES.md
    content: |
      # Email Triage Rules

      ## Priority Classification

      1. **Urgent** — From flagged senders, contains "urgent"/"ASAP"/"emergency", or time-sensitive deadlines within 24h
      2. **Action Required** — Needs a reply or task creation, but not time-critical
      3. **Informational** — FYI, newsletters, notifications — archive after digest
      4. **Auto-handled** — Meeting confirmations, read receipts, automated notifications — auto-archive

      ## Auto-Reply Rules

      - Never auto-reply to first contact (unknown sender)
      - Never auto-reply to flagged senders (requires user approval)
      - Meeting confirmations and acknowledgments may be auto-replied based on user preference
      - All auto-replies are logged in the audit trail

      ## Focus Block Protection

      - During calendar focus blocks, hold all non-urgent notifications
      - Deliver held notifications as a batch when the focus block ends
      - Urgent items from flagged senders bypass focus block holds

toolbelt:
  role: "Email operations manager"
  description: "Inbox triage, calendar-aware digests, task extraction, morning briefs — replaces manual email management"
  tools:
    - name: email
      category: email
      required: true
      description: "Email reading, triage, and drafting via himalaya — inbox zero engine"
    - name: ical
      category: calendar
      required: true
      description: "Calendar awareness via CalDAV — schedule conflicts, focus block protection"
    - name: todoist
      category: tasks
      required: false
      description: "Task extraction and tracking via Todoist API"
    - name: todoist-sync
      category: tasks
      required: false
      description: "Task deadline alerts and follow-up reminders"
    - name: tasks
      category: core
      required: true
      description: "Local work queue for autonomous task execution and action item tracking"
  skills:
    - name: email-digest
      required: true
      description: "Periodic inbox digest — triage summary, action items extracted, auto-reply status"
    - name: morning-brief
      required: true
      description: "Daily morning briefing — inbox status, calendar preview, priority items, overnight summary"
    - name: auto-reply
      required: false
      description: "Autonomous replies to routine emails in user's voice with approval gates"
