name: Replace ChatGPT Plus
version: "1.0.0"

use_case_mapping:
  replaces: ChatGPT Plus
  tagline: "Research and writing partner — deep research, drafts, brainstorming"
  description: >
    Research and writing partner that handles deep research, citation
    management, writing assistance, and brainstorming. Minimizes interruptions
    and works deeply on demand.
  day_in_the_life: >
    You send your agent a research question via Telegram. It spends 20 minutes
    pulling sources, cross-referencing, and drafting a summary with citations —
    all on local models, zero data leaving your machine. When you need a longer
    piece written, you describe the outline and the agent drafts it, section by
    section, asking clarifying questions only when genuinely stuck. Your research
    history builds over months, creating a personal knowledge base only you control.

customization_questions:
  - id: research_domain
    prompt: "What's your primary research or writing domain?"
    type: input
    default: "General knowledge"
  - id: response_depth
    prompt: "How detailed should responses be by default?"
    type: select
    options:
      - "Concise — key points only, I'll ask for more if needed"
      - "Balanced — thorough but not exhaustive"
      - "Deep — comprehensive analysis with sources and context"

personality:
  tone: thoughtful
  style: "precise, thorough, focuses on depth over breadth"
  relationship: research partner
  boundaries: "prioritizes accuracy, flags uncertainty"
  dimensions:
    directness: 2
    warmth: 2
    verbosity: 4
    proactivity: 1
    caution: 4
    formality: 3
    analyticalDepth: 4

security_posture:
  posture: hardened
  egress: restricted
  egress_domains:
    - api.tavily.com
  identity_mount: read-only

monitoring:
  heartbeat_frequency: "30min"
  checks:
    - research
  quiet_hours: "23:00-07:00"
  alert_on:
    - credential_expiry
    - memory_bloat

memory_policy:
  hot_max: "200KB"
  hot_retention: "14d"
  warm_retention: "180d"
  cold_retention: "365d"
  summarization: conservative

cron_config:
  heartbeat: "*/30 waking"
  work_session: "*/60 waking"
  morning_brief: "09:00"
  model_routing:
    heartbeat:
      model: haiku
      fallbacks: [sonnet]
    work_session:
      model: sonnet
      fallbacks: [haiku]
    morning_brief:
      model: sonnet
      fallbacks: [haiku]

autonomy_model:
  default: low
  requires_approval:
    - public_posts
    - sending_messages
    - account_changes

model_routing_strategy:
  default_provider: local
  local_model_preference: "llama3:70b"
  cloud_escalation_categories:
    - deep_research
    - long_form_writing
    - code_generation
  quality_threshold: high

integration_requirements:
  required:
    - messaging
  recommended:
    - research
    - code
  optional:
    - notes
    - email

channels:
  supported:
    - telegram
    - discord
    - matrix
  default: telegram

skill_bundle:
  included:
    - construct
  recommended:
    - web-search
    - citation-manager

toolbelt:
  role: "Research and writing partner"
  description: "Deep research, web search, writing assistance, brainstorming — replaces ChatGPT Plus"
  tools:
    - name: tavily
      category: research
      required: true
      description: "Web research via Tavily API"
    - name: tasks
      category: core
      required: true
      description: "Local work queue for research task tracking"
  skills:
    - name: construct
      required: true
      description: "Self-improvement framework for expanding research capabilities"
