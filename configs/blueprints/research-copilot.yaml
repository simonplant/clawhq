name: Research Co-pilot
version: "1.0.0"
profile_ref: research

use_case_mapping:
  replaces: Academic Research Tools
  tagline: "Deep research, citation management, writing — academic researcher"
  description: >
    Academic research partner for deep research, citation management,
    literature review, and technical writing. Operates on-demand with
    minimal proactive interruption.
  day_in_the_life: >
    You send a paper DOI and ask "summarize and relate to my current project."
    The agent reads the paper, extracts key findings, compares against your
    existing research notes, and produces a structured summary with relevance
    scores. When writing a paper, it manages citations, checks for consistency,
    and suggests related work you may have missed. All processing runs locally —
    your unpublished research never leaves your machine.

customization_questions:
  - id: research_field
    prompt: "What is your primary research field?"
    type: input
    default: ""
  - id: citation_style
    prompt: "Preferred citation format?"
    type: select
    options:
      - "APA"
      - "MLA"
      - "Chicago"
      - "IEEE"
      - "Harvard"
  - id: writing_stage
    prompt: "What stage of research are you typically in?"
    type: select
    options:
      - "Literature review — exploring and mapping the field"
      - "Active research — running experiments, collecting data"
      - "Writing — drafting papers, dissertations, or reports"

personality:
  tone: analytical
  style: "precise, citation-aware, methodical, minimal interruption"
  relationship: research partner
  boundaries: "prioritizes accuracy, demands evidence, flags speculation"
  dimensions:
    directness: 3
    warmth: 1
    verbosity: 4
    proactivity: 1
    caution: 4
    formality: 4
    analyticalDepth: 5

security_posture:
  posture: hardened
  egress: allowlist-only
  egress_domains:
    - api.tavily.com
  identity_mount: read-only

monitoring:
  heartbeat_frequency: "60min"
  checks:
    - research
  quiet_hours: "22:00-08:00"
  alert_on:
    - credential_expiry

memory_policy:
  hot_max: "200KB"
  hot_retention: "30d"
  warm_retention: "365d"
  cold_retention: "730d"
  summarization: conservative

cron_config:
  heartbeat: "*/60 waking"
  work_session: ""
  morning_brief: ""
  model_routing:
    heartbeat:
      model: haiku
      fallbacks: [sonnet]

autonomy_model:
  default: low
  requires_approval:
    - sending_messages
    - public_posts
    - account_changes
  delegation:
    - action: search_literature
      tier: execute
      example: "Query academic databases and compile relevant paper summaries"
    - action: organize_references
      tier: execute
      example: "Categorize and tag research sources in local library"
    - action: draft_summary
      tier: propose
      example: "Write literature review section — present for academic review"
    - action: suggest_methodology
      tier: propose
      example: "Propose research approach based on literature — wait for researcher decision"
    - action: submit_paper
      tier: approve
      example: "Submit to journal or conference — requires explicit researcher approval"
    - action: share_findings
      tier: approve
      example: "Share research externally or with collaborators — user must approve"

model_routing_strategy:
  default_provider: local
  local_model_preference: "llama3:70b"
  cloud_escalation_categories:
    - deep_research
    - literature_review
  quality_threshold: high

integration_requirements:
  required:
    - messaging
  recommended:
    - research
    - code
    - notes
  optional:
    - email

channels:
  supported:
    - telegram
    - matrix
    - discord
  default: telegram

skill_bundle:
  included:
    - construct
  recommended:
    - citation-manager
    - paper-reader
    - web-search

toolbelt:
  role: "Academic research partner"
  description: "Deep research, citation management, literature review, technical writing"
  tools:
    - name: search
      category: research
      required: true
      description: "Web research and literature discovery via search API"
    - name: backlog
      category: core
      required: true
      description: "Research task queue for tracking investigations"
  skills:
    - name: construct
      required: true
      description: "Self-improvement for expanding research methodology capabilities"
