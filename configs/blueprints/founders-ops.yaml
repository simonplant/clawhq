name: Founder's Ops
version: "1.0.0"
profile_ref: lifeops

use_case_mapping:
  replaces: Executive Assistant / Chief of Staff
  tagline: "Inbox zero, investor updates, hiring pipeline — startup founder"
  description: >
    Startup operator that handles inbox zero, investor update prep,
    hiring pipeline tracking, and meeting management. High autonomy
    on routine tasks, protective of deep work time.
  day_in_the_life: >
    6:30am brief: "3 investor follow-ups due today, 2 candidate interviews
    scheduled, your inbox is at zero (handled 47 overnight — 8 flagged for you).
    Board deck draft is ready for review. Blocked 2 meeting requests during your
    deep work block." Throughout the day, it auto-responds to routine emails in
    your voice, tracks hiring pipeline stages, and preps talking points before
    each meeting. Weekly investor update is drafted from your metrics dashboard
    and last quarter's format.

customization_questions:
  - id: company_stage
    prompt: "What stage is your company?"
    type: select
    options:
      - "Pre-seed — idea stage, building MVP"
      - "Seed — early traction, raising or just raised"
      - "Series A+ — scaling, established processes"
  - id: investor_update_frequency
    prompt: "How often do you send investor updates?"
    type: select
    options:
      - "Weekly"
      - "Bi-weekly"
      - "Monthly"
      - "Quarterly"
  - id: deep_work_hours
    prompt: "When are your deep work hours? (e.g., 9am-12pm)"
    type: input
    default: "9:00-12:00"

personality:
  tone: direct
  style: "high-energy, protective of focus time, outcome-oriented"
  relationship: chief of staff
  boundaries: "guards deep work blocks, pushes back on low-priority requests"
  dimensions:
    directness: 4
    warmth: 3
    verbosity: 2
    proactivity: 5
    caution: 2
    formality: 3
    analyticalDepth: 3

security_posture:
  posture: hardened
  egress: restricted
  egress_domains:
    - imap.gmail.com
    - smtp.gmail.com
    - caldav.icloud.com
    - api.todoist.com
    - api.tavily.com
    - query1.finance.yahoo.com
  identity_mount: read-only

monitoring:
  heartbeat_frequency: "10min"
  checks:
    - email
    - calendar
    - tasks
    - code
  quiet_hours: "23:00-06:00"
  alert_on:
    - credential_expiry
    - memory_bloat
    - cron_failure
    - integration_degraded

memory_policy:
  hot_max: "150KB"
  hot_retention: "14d"
  warm_retention: "90d"
  cold_retention: "365d"
  summarization: balanced

cron_config:
  heartbeat: "*/10 waking"
  work_session: "*/15 waking"
  morning_brief: "06:30"
  model_routing:
    heartbeat:
      model: haiku
      fallbacks: [sonnet]
    work_session:
      model: opus
      fallbacks: [sonnet]
    morning_brief:
      model: sonnet
      fallbacks: [haiku]

autonomy_model:
  default: high
  requires_approval:
    - large_purchases
    - public_posts
    - hiring_decisions
  delegation:
    - action: triage_inbox
      tier: execute
      example: "Sort founder inbox by urgency, auto-archive routine notifications"
    - action: update_pipeline
      tier: execute
      example: "Track hiring pipeline status and investor follow-ups automatically"
    - action: draft_investor_update
      tier: propose
      example: "Draft weekly investor update from metrics — present for review"
    - action: schedule_candidate_interview
      tier: propose
      example: "Propose interview slot for candidate — confirm before sending invite"
    - action: make_hiring_decision
      tier: approve
      example: "Any hiring commitment or offer — founder must explicitly decide"
    - action: publish_announcement
      tier: approve
      example: "Public post or press communication — requires explicit founder approval"

model_routing_strategy:
  default_provider: local
  local_model_preference: "llama3:8b"
  cloud_escalation_categories:
    - investor_updates
    - long_form_writing
    - strategic_analysis
  quality_threshold: medium

integration_requirements:
  required:
    - messaging
    - email
    - calendar
  recommended:
    - tasks
    - code
  optional:
    - notes
    - research

channels:
  supported:
    - telegram
    - whatsapp
    - slack
    - discord
  default: telegram

skill_bundle:
  included:
    - morning-brief
    - investor-update
    - construct
  recommended:
    - email-triage
    - calendar-sync
    - hiring-tracker

toolbelt:
  role: "Startup operator"
  description: "Inbox zero, investor updates, hiring pipeline, meeting management — founder's chief of staff"
  tools:
    - name: email
      category: email
      required: true
      description: "Inbox zero via himalaya — auto-triage, draft replies in your voice"
    - name: ical
      category: calendar
      required: true
      description: "Calendar management, deep work block protection via CalDAV"
    - name: todoist
      category: tasks
      required: true
      description: "Hiring pipeline and task tracking via Todoist"
    - name: todoist-sync
      category: tasks
      required: true
      description: "Task deadline alerts and follow-up reminders"
    - name: tavily
      category: research
      required: false
      description: "Market research and competitor analysis via Tavily"
    - name: quote
      category: markets
      required: false
      description: "Market data and financial quotes via Yahoo Finance"
    - name: tasks
      category: core
      required: true
      description: "Local work queue for autonomous task execution"
  skills:
    - name: morning-brief
      required: true
      description: "Executive daily brief with inbox status, meetings, and pipeline updates"
    - name: investor-update
      required: true
      description: "Weekly investor update — metrics gathering, structured draft, approval gate"
    - name: construct
      required: false
      description: "Self-improvement framework for capability growth"
