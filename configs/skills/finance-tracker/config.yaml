name: finance-tracker
version: "1.0.0"
description: "Personal finance monitoring — balance tracking, anomaly detection, weekly spending summary"

schedule:
  cron: "0 8 * * *"
  weekly_summary: "0 19 * * 0"

model:
  provider: local
  minimum: "llama3:8b"
  cloud_escalation: false

dependencies:
  tools:
    - finance
  skills: []

approval:
  required: false
  category: notification
  auto_approve: true

boundaries:
  network_access: false
  file_write: false
  account_changes: false
  auto_send: false
