# schedule-guard skill configuration
name: schedule-guard
version: "1.0.0"
description: "Schedule protection — conflict detection, focus block guarding, overload alerts"

# Schedule: every 15 minutes during waking hours
# Aligned with blueprint cron_config.work_session
schedule:
  cron: "*/15 * * * *"
  active_hours:
    start: 6
    end: 22

# Model requirements — local only, no cloud
model:
  provider: local
  minimum: "gemma4:26b"
  cloud_escalation: false

# Tools this skill depends on
dependencies:
  tools:
    - calendar
    - tasks
  skills: []

# Approval: calendar changes require user consent, detection is automatic
approval:
  required: true
  category: calendar_change
  auto_approve: false

# Boundaries
boundaries:
  network_access: false
  file_write: false
  account_changes: false
  auto_send: false
