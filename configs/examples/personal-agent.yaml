# Example non-interactive config for clawhq init --config
# Usage: clawhq init --config configs/examples/personal-agent.yaml

blueprint: replace-my-pa
channel: telegram
model_provider: local
local_model: "llama3:8b"
deploy_dir: ~/dev/clawdius

user:
  name: Simon
  timezone: Australia/Sydney
  communication: brief

customization:
  work_style: "Professional but casual — friendly yet competent"
  scheduling_preference: "Suggest options — propose solutions, I confirm"
  priority_contacts: ""

