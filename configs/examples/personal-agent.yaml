# Example config for clawhq init --config
# Usage: clawhq init --config configs/examples/personal-agent.yaml
#
# Copy this file to your deployment directory and fill in real values.
# Never commit credentials to the clawhq repo.
#
# Browse options:
#   clawhq compose profiles       — mission profiles (WHAT)
#   clawhq compose personalities  — personality presets (HOW)
#   clawhq compose providers      — integration providers (a la carte)

profile: life-ops
personality: direct-operator
deploy_dir: ~/.clawhq

providers:
  email: gmail
  calendar: icloud-cal
  tasks: todoist
  search: tavily

user:
  name: User
  # timezone: America/New_York
  communication: brief

# Channel credentials (uncomment and fill)
# channels:
#   telegram:
#     bot_token: "your-bot-token-from-@BotFather"

# Model credentials (uncomment for cloud models)
