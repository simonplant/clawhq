# Example config for clawhq init --config
# Usage: clawhq init --config configs/examples/personal-agent.yaml
#
# Copy this file to your deployment directory and fill in real values.
# Never commit credentials to the clawhq repo.
#
# Browse options:
#   clawhq compose profiles       — mission profiles
#   clawhq compose providers      — integration providers (a la carte)

profile: life-ops
# personality: digital-assistant  — default, omit to use the standard professional tone
soul_overrides: |
  Be direct. No filler.
deploy_dir: ~/.clawhq

providers:
  email: gmail
  calendar: icloud-cal
  tasks: todoist
  search: tavily
  # models: ollama-local          — default, no config needed
  # models: google-ai             — Gemini API (PAYG)
  # models: anthropic-api         — Claude API (PAYG only, subscriptions NOT supported)
  # models: openai-api            — OpenAI API
  # models: openrouter            — 100+ models via one API key

user:
  name: User
  # timezone: America/New_York
  communication: brief

# Channel credentials (uncomment and fill)
# channels:
#   telegram:
#     bot_token: "your-bot-token-from-@BotFather"
